apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: sample-app
  labels:
    app.kubernetes.io/name: payment-api
    app.kubernetes.io/part-of: opspilot-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-api
        app.kubernetes.io/part-of: opspilot-demo
    spec:
      containers:
        - name: payment-api
          image: nginx:1.28-alpine
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: sample-app
  labels:
    app.kubernetes.io/name: payment-api
spec:
  selector:
    app.kubernetes.io/name: payment-api
  ports:
    - name: http
      port: 80
      targetPort: http
