apiVersion: v1
kind: PersistentVolume
metadata:
  name: unused-demo-data
  labels:
    app.kubernetes.io/part-of: opspilot-demo
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: opspilot-demo-static
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /tmp/opspilot-unused-demo-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unused-demo-data
  namespace: sample-app
  labels:
    app.kubernetes.io/part-of: opspilot-demo
spec:
  storageClassName: opspilot-demo-static
  volumeName: unused-demo-data
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
