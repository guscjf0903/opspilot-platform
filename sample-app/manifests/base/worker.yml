apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: sample-app
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: opspilot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: opspilot-demo
    spec:
      containers:
        - name: worker
          image: busybox:1.37.0
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
