spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

opspilot:
  kubernetes:
    mode: in-cluster
    cluster-id: aws-dev
    display-name: aws-dev
    provider: eks
  prometheus:
    base-url: ${PROMETHEUS_BASE_URL}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  opencost:
    enabled: true
    base-url: ${OPENCOST_BASE_URL}
    allocation-window: 1d
    allocation-resolution: 1m
    share-idle: true
    allocation-window-hours: 24
    monthly-hours: 730
  aws:
    enabled: true
    region: ap-northeast-2
  ai:
    provider: ${AI_PROVIDER:openai}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL:gpt-5.4-mini}
      reasoning-effort: ${OPENAI_REASONING_EFFORT:low}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:1200}
