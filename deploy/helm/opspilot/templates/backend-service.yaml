{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opspilot.backendName" . }}
  labels:
    {{- include "opspilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "opspilot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
{{- end }}
