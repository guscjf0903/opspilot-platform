{{- if .Values.demoSampleApp.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.demoSampleApp.namespace }}
  labels:
    app.kubernetes.io/part-of: opspilot-demo
    opspilot.io/demo-mode: {{ .Values.demoModeLabel | quote }}
{{- end }}
{{- if and .Values.demoKafka.enabled (or (not .Values.demoSampleApp.enabled) (ne .Values.demoKafka.namespace .Values.demoSampleApp.namespace)) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.demoKafka.namespace }}
  labels:
    app.kubernetes.io/part-of: opspilot-demo
    opspilot.io/demo-mode: {{ .Values.demoModeLabel | quote }}
{{- end }}
