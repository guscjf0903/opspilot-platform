{{- if .Values.demoSampleApp.enabled }}
{{- $namespace := .Values.demoSampleApp.namespace }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: payment-api
    app.kubernetes.io/part-of: opspilot-demo
spec:
  replicas: {{ .Values.demoSampleApp.paymentApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-api
        app.kubernetes.io/part-of: opspilot-demo
    spec:
      containers:
        - name: payment-api
          image: "{{ .Values.demoSampleApp.paymentApi.image.repository }}:{{ .Values.demoSampleApp.paymentApi.image.tag }}"
          imagePullPolicy: {{ .Values.demoSampleApp.paymentApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.demoSampleApp.paymentApi.readinessPath }}
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.demoSampleApp.paymentApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: payment-api
    app.kubernetes.io/part-of: opspilot-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payment-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/part-of: opspilot-demo
spec:
  replicas: {{ .Values.demoSampleApp.catalogApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-api
        app.kubernetes.io/part-of: opspilot-demo
    spec:
      containers:
        - name: catalog-api
          image: "{{ .Values.demoSampleApp.catalogApi.image.repository }}:{{ .Values.demoSampleApp.catalogApi.image.tag }}"
          imagePullPolicy: {{ .Values.demoSampleApp.catalogApi.image.pullPolicy }}
          resources:
            {{- toYaml .Values.demoSampleApp.catalogApi.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: opspilot-demo
spec:
  replicas: {{ .Values.demoSampleApp.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: opspilot-demo
    spec:
      containers:
        - name: worker
          image: "{{ .Values.demoSampleApp.worker.image.repository }}:{{ .Values.demoSampleApp.worker.image.tag }}"
          imagePullPolicy: {{ .Values.demoSampleApp.worker.image.pullPolicy }}
          {{- if .Values.demoSampleApp.worker.crashLoop }}
          command: ["sh", "-c", "echo 'simulated worker crash for OpsPilot Mode B Lite' >&2; exit 1"]
          {{- else }}
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          {{- end }}
          resources:
            {{- toYaml .Values.demoSampleApp.worker.resources | nindent 12 }}
{{- if .Values.demoSampleApp.unusedPvc.enabled }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "opspilot.fullname" . }}-unused-demo-data
  labels:
    app.kubernetes.io/part-of: opspilot-demo
spec:
  capacity:
    storage: {{ .Values.demoSampleApp.unusedPvc.storage }}
  accessModes:
    - ReadWriteOnce
  storageClassName: opspilot-demo-static
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /tmp/opspilot-unused-demo-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unused-demo-data
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/part-of: opspilot-demo
spec:
  storageClassName: opspilot-demo-static
  volumeName: {{ include "opspilot.fullname" . }}-unused-demo-data
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.demoSampleApp.unusedPvc.storage }}
{{- end }}
{{- end }}
