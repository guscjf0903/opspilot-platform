{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opspilot.frontendName" . }}
  labels:
    {{- include "opspilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "opspilot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
