{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "opspilot.fullname" . }}-test-connection
  labels:
    {{- include "opspilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - sh
        - -c
        - |
          set -eu
          curl -fsS "http://{{ include "opspilot.backendName" . }}:{{ .Values.backend.service.port }}/actuator/health"
          curl -fsS "http://{{ include "opspilot.frontendName" . }}:{{ .Values.frontend.service.port }}/"
          {{- if .Values.tests.observability.enabled }}
          curl -fsS "{{ .Values.tests.observability.prometheusUrl }}"
          curl -fsS "{{ .Values.tests.observability.openCostUrl }}"
          {{- end }}
{{- end }}
