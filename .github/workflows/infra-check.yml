name: Infra check

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "deploy/helm/**"
      - "scripts/**"
      - ".github/workflows/infra-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - bootstrap-cost-guard
          - aws-dev-foundation
          - aws-dev-ephemeral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init
        run: terraform -chdir=infra/terraform/envs/${{ matrix.environment }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/terraform/envs/${{ matrix.environment }} validate

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/opspilot

      - name: Render local kind values
        run: helm template opspilot deploy/helm/opspilot -f deploy/helm/opspilot/values-local-kind.yaml

      - name: Render aws-dev ephemeral values
        run: helm template opspilot deploy/helm/opspilot -f deploy/helm/opspilot/values-aws-dev-ephemeral.yaml

  scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          for script in $(find scripts -name '*.sh' | sort); do
            bash -n "$script"
          done
