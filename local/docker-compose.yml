name: opspilot-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME in local/.env}
      POSTGRES_USER: ${DB_USERNAME:?Set DB_USERNAME in local/.env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in local/.env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092,host://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://host.docker.internal:${REDPANDA_KAFKA_PORT:-9092},host://localhost:${REDPANDA_HOST_KAFKA_PORT:-19092}
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:9092"
      - "${REDPANDA_HOST_KAFKA_PORT:-19092}:19092"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=redpanda:29092 | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - rpk topic create orders.created -X brokers=redpanda:29092 --if-not-exists

volumes:
  postgres-data:
  redpanda-data:
